# Push all NEXT_PUBLIC_* env vars from GitHub to Vercel (production and/or preview).
# Run manually after changing repo variables or secrets; does not trigger deploy hooks.
# See docs/DEPLOYMENT.md §3.1.
name: Vercel sync env

on:
  workflow_dispatch:
    inputs:
      sync_production:
        description: Sync full env to Vercel production
        type: boolean
        default: true
      sync_preview:
        description: Sync full env to Vercel preview (staging / PR builds)
        type: boolean
        default: true

jobs:
  sync-production:
    name: Sync env to Vercel production
    runs-on: ubuntu-latest
    environment: PROD
    if: ${{ inputs.sync_production }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      SPOTIFY_REDIRECT_RELATIVE_URI: ${{ vars.SPOTIFY_REDIRECT_RELATIVE_URI }}
      SPOTIFY_SCOPES: ${{ vars.SPOTIFY_SCOPES }}
      GOOGLE_REDIRECT_RELATIVE_URI: ${{ vars.GOOGLE_REDIRECT_RELATIVE_URI }}
      TRACK_UPLOAD_TIMEOUT_MS: ${{ vars.TRACK_UPLOAD_TIMEOUT_MS }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HTMT_API_SUBDOMAIN: ${{ vars.HTMT_API_SUBDOMAIN }}
      HTMT_API_ROOT_SEGMENT: ${{ vars.HTMT_API_ROOT_SEGMENT }}
      GTMT_FRONT_SUBDOMAIN: ${{ vars.GTMT_FRONT_SUBDOMAIN }}
      AUDIOMETA_SUBDOMAIN: ${{ vars.AUDIOMETA_SUBDOMAIN }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID_PROD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_PROD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$NPM_TOKEN" ] && missing="$missing GH_PACKAGES_TOKEN"
          [ -z "$CONTACT_EMAIL" ] && missing="$missing CONTACT_EMAIL"
          [ -z "$SPOTIFY_REDIRECT_RELATIVE_URI" ] && missing="$missing SPOTIFY_REDIRECT_RELATIVE_URI"
          [ -z "$SPOTIFY_SCOPES" ] && missing="$missing SPOTIFY_SCOPES"
          [ -z "$GOOGLE_REDIRECT_RELATIVE_URI" ] && missing="$missing GOOGLE_REDIRECT_RELATIVE_URI"
          [ -z "$TRACK_UPLOAD_TIMEOUT_MS" ] && missing="$missing TRACK_UPLOAD_TIMEOUT_MS"
          [ -z "$DOMAIN_NAME" ] && missing="$missing DOMAIN_NAME"
          [ -z "$HTMT_API_SUBDOMAIN" ] && missing="$missing HTMT_API_SUBDOMAIN"
          [ -z "$HTMT_API_ROOT_SEGMENT" ] && missing="$missing HTMT_API_ROOT_SEGMENT"
          [ -z "$GTMT_FRONT_SUBDOMAIN" ] && missing="$missing GTMT_FRONT_SUBDOMAIN"
          [ -z "$AUDIOMETA_SUBDOMAIN" ] && missing="$missing AUDIOMETA_SUBDOMAIN"
          [ -z "$SPOTIFY_CLIENT_ID" ] && missing="$missing SPOTIFY_CLIENT_ID_PROD"
          [ -z "$GOOGLE_CLIENT_ID" ] && missing="$missing GOOGLE_CLIENT_ID_PROD"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo vars or PROD env):$missing"
            exit 1
          fi
          echo "All required vars are set."

      - name: Sync env to Vercel production
        run: bash scripts/vercel-sync-env-from-github.sh production full

  sync-preview:
    name: Sync env to Vercel preview
    runs-on: ubuntu-latest
    environment: STAGING
    if: ${{ inputs.sync_preview }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NPM_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      SPOTIFY_REDIRECT_RELATIVE_URI: ${{ vars.SPOTIFY_REDIRECT_RELATIVE_URI }}
      SPOTIFY_SCOPES: ${{ vars.SPOTIFY_SCOPES }}
      GOOGLE_REDIRECT_RELATIVE_URI: ${{ vars.GOOGLE_REDIRECT_RELATIVE_URI }}
      TRACK_UPLOAD_TIMEOUT_MS: ${{ vars.TRACK_UPLOAD_TIMEOUT_MS }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      HTMT_API_SUBDOMAIN: ${{ vars.HTMT_API_SUBDOMAIN }}
      HTMT_API_ROOT_SEGMENT: ${{ vars.HTMT_API_ROOT_SEGMENT }}
      GTMT_FRONT_SUBDOMAIN: ${{ vars.GTMT_FRONT_SUBDOMAIN }}
      AUDIOMETA_SUBDOMAIN: ${{ vars.AUDIOMETA_SUBDOMAIN }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID_STAGING }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID_STAGING }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$NPM_TOKEN" ] && missing="$missing GH_PACKAGES_TOKEN"
          [ -z "$CONTACT_EMAIL" ] && missing="$missing CONTACT_EMAIL"
          [ -z "$SPOTIFY_REDIRECT_RELATIVE_URI" ] && missing="$missing SPOTIFY_REDIRECT_RELATIVE_URI"
          [ -z "$SPOTIFY_SCOPES" ] && missing="$missing SPOTIFY_SCOPES"
          [ -z "$GOOGLE_REDIRECT_RELATIVE_URI" ] && missing="$missing GOOGLE_REDIRECT_RELATIVE_URI"
          [ -z "$TRACK_UPLOAD_TIMEOUT_MS" ] && missing="$missing TRACK_UPLOAD_TIMEOUT_MS"
          [ -z "$DOMAIN_NAME" ] && missing="$missing DOMAIN_NAME"
          [ -z "$HTMT_API_SUBDOMAIN" ] && missing="$missing HTMT_API_SUBDOMAIN"
          [ -z "$HTMT_API_ROOT_SEGMENT" ] && missing="$missing HTMT_API_ROOT_SEGMENT"
          [ -z "$GTMT_FRONT_SUBDOMAIN" ] && missing="$missing GTMT_FRONT_SUBDOMAIN"
          [ -z "$AUDIOMETA_SUBDOMAIN" ] && missing="$missing AUDIOMETA_SUBDOMAIN"
          [ -z "$SPOTIFY_CLIENT_ID" ] && missing="$missing SPOTIFY_CLIENT_ID_STAGING"
          [ -z "$GOOGLE_CLIENT_ID" ] && missing="$missing GOOGLE_CLIENT_ID_STAGING"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo vars or STAGING env):$missing"
            exit 1
          fi
          echo "All required vars are set."

      - name: Sync env to Vercel preview
        run: bash scripts/vercel-sync-env-from-github.sh preview full
