# Sync environment variables from GitHub to Vercel (Production and Preview).
# Run manually: Actions → Sync Vercel env → Run workflow.
# Uses GitHub Environments so BACKEND_BASE_URL, APP_URL (and client IDs per env) can differ:
#   Production env → Vercel "production"; Staging env → Vercel "preview".
# Required: repo secrets VERCEL_TOKEN, VERCEL_PROJECT_ID; repo vars and env vars per docs/DEPLOYMENT.md §3.1.
name: Sync Vercel env

on:
  workflow_dispatch:

jobs:
  sync-production:
    name: Sync to Vercel production
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      SPOTIFY_REDIRECT_RELATIVE_URI: ${{ vars.SPOTIFY_REDIRECT_RELATIVE_URI }}
      SPOTIFY_SCOPES: ${{ vars.SPOTIFY_SCOPES }}
      GOOGLE_REDIRECT_RELATIVE_URI: ${{ vars.GOOGLE_REDIRECT_RELATIVE_URI }}
      TRACK_UPLOAD_TIMEOUT_MS: ${{ vars.TRACK_UPLOAD_TIMEOUT_MS }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      AUDIOMETA_SUBDOMAIN_NAME: ${{ vars.AUDIOMETA_SUBDOMAIN_NAME }}
      SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID_PROD }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID_PROD }}
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
      APP_URL: ${{ vars.APP_URL }}
    steps:
      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$CONTACT_EMAIL" ] && missing="$missing CONTACT_EMAIL"
          [ -z "$SPOTIFY_REDIRECT_RELATIVE_URI" ] && missing="$missing SPOTIFY_REDIRECT_RELATIVE_URI"
          [ -z "$SPOTIFY_SCOPES" ] && missing="$missing SPOTIFY_SCOPES"
          [ -z "$GOOGLE_REDIRECT_RELATIVE_URI" ] && missing="$missing GOOGLE_REDIRECT_RELATIVE_URI"
          [ -z "$TRACK_UPLOAD_TIMEOUT_MS" ] && missing="$missing TRACK_UPLOAD_TIMEOUT_MS"
          [ -z "$DOMAIN_NAME" ] && missing="$missing DOMAIN_NAME"
          [ -z "$AUDIOMETA_SUBDOMAIN_NAME" ] && missing="$missing AUDIOMETA_SUBDOMAIN_NAME"
          [ -z "$SPOTIFY_CLIENT_ID" ] && missing="$missing SPOTIFY_CLIENT_ID_PROD"
          [ -z "$GOOGLE_CLIENT_ID" ] && missing="$missing GOOGLE_CLIENT_ID_PROD"
          [ -z "$BACKEND_BASE_URL" ] && missing="$missing BACKEND_BASE_URL"
          [ -z "$APP_URL" ] && missing="$missing APP_URL"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo vars or production env):$missing"
            exit 1
          fi
          echo "All required env vars are set."

      - name: Sync to Vercel production
        run: |
          set -e
          APP_URL_TRIM="${APP_URL%/}"
          SPOTIFY_REDIRECT_URI="${APP_URL_TRIM}/${SPOTIFY_REDIRECT_RELATIVE_URI#/}"
          GOOGLE_REDIRECT_URI="${APP_URL_TRIM}/${GOOGLE_REDIRECT_RELATIVE_URI#/}"
          AUDIOMETA_URL="https://${AUDIOMETA_SUBDOMAIN_NAME}.${DOMAIN_NAME}"
          sync_var() {
            local value="$1"
            local key="$2"
            [ -z "$value" ] && return 0
            echo "Syncing $key to production..."
            body=$(jq -n --arg key "$key" --arg value "$value" '{key:$key, value:$value, type:"plain", target:["production"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_var "$CONTACT_EMAIL" "NEXT_PUBLIC_CONTACT_EMAIL"
          sync_var "$BACKEND_BASE_URL" "NEXT_PUBLIC_BACKEND_BASE_URL"
          sync_var "true" "NEXT_PUBLIC_SENTRY_IS_ACTIVE"
          sync_var "https://accounts.spotify.com/authorize" "NEXT_PUBLIC_SPOTIFY_AUTH_URL"
          sync_var "$SPOTIFY_CLIENT_ID" "NEXT_PUBLIC_SPOTIFY_CLIENT_ID"
          sync_var "$SPOTIFY_REDIRECT_URI" "NEXT_PUBLIC_SPOTIFY_REDIRECT_URI"
          sync_var "$SPOTIFY_SCOPES" "NEXT_PUBLIC_SPOTIFY_SCOPES"
          sync_var "$GOOGLE_CLIENT_ID" "NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          sync_var "$GOOGLE_REDIRECT_URI" "NEXT_PUBLIC_GOOGLE_REDIRECT_URI"
          sync_var "$TRACK_UPLOAD_TIMEOUT_MS" "NEXT_PUBLIC_TRACK_UPLOAD_TIMEOUT_MS"
          sync_var "$AUDIOMETA_URL" "NEXT_PUBLIC_AUDIOMETA_URL"
          echo "Production sync done."

  sync-staging:
    name: Sync to Vercel preview (staging)
    runs-on: ubuntu-latest
    environment: staging
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
      SPOTIFY_REDIRECT_RELATIVE_URI: ${{ vars.SPOTIFY_REDIRECT_RELATIVE_URI }}
      SPOTIFY_SCOPES: ${{ vars.SPOTIFY_SCOPES }}
      GOOGLE_REDIRECT_RELATIVE_URI: ${{ vars.GOOGLE_REDIRECT_RELATIVE_URI }}
      TRACK_UPLOAD_TIMEOUT_MS: ${{ vars.TRACK_UPLOAD_TIMEOUT_MS }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
      AUDIOMETA_SUBDOMAIN_NAME: ${{ vars.AUDIOMETA_SUBDOMAIN_NAME }}
      SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID_TEST }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID_TEST }}
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
      APP_URL: ${{ vars.APP_URL }}
    steps:
      - name: Validate required env vars
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$CONTACT_EMAIL" ] && missing="$missing CONTACT_EMAIL"
          [ -z "$SPOTIFY_REDIRECT_RELATIVE_URI" ] && missing="$missing SPOTIFY_REDIRECT_RELATIVE_URI"
          [ -z "$SPOTIFY_SCOPES" ] && missing="$missing SPOTIFY_SCOPES"
          [ -z "$GOOGLE_REDIRECT_RELATIVE_URI" ] && missing="$missing GOOGLE_REDIRECT_RELATIVE_URI"
          [ -z "$TRACK_UPLOAD_TIMEOUT_MS" ] && missing="$missing TRACK_UPLOAD_TIMEOUT_MS"
          [ -z "$DOMAIN_NAME" ] && missing="$missing DOMAIN_NAME"
          [ -z "$AUDIOMETA_SUBDOMAIN_NAME" ] && missing="$missing AUDIOMETA_SUBDOMAIN_NAME"
          [ -z "$SPOTIFY_CLIENT_ID" ] && missing="$missing SPOTIFY_CLIENT_ID_TEST"
          [ -z "$GOOGLE_CLIENT_ID" ] && missing="$missing GOOGLE_CLIENT_ID_TEST"
          [ -z "$BACKEND_BASE_URL" ] && missing="$missing BACKEND_BASE_URL"
          [ -z "$APP_URL" ] && missing="$missing APP_URL"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (repo vars or staging env):$missing"
            exit 1
          fi
          echo "All required env vars are set."

      - name: Sync to Vercel preview
        run: |
          set -e
          APP_URL_TRIM="${APP_URL%/}"
          SPOTIFY_REDIRECT_URI="${APP_URL_TRIM}/${SPOTIFY_REDIRECT_RELATIVE_URI#/}"
          GOOGLE_REDIRECT_URI="${APP_URL_TRIM}/${GOOGLE_REDIRECT_RELATIVE_URI#/}"
          AUDIOMETA_URL="https://${AUDIOMETA_SUBDOMAIN_NAME}.${DOMAIN_NAME}"
          sync_var() {
            local value="$1"
            local key="$2"
            [ -z "$value" ] && return 0
            echo "Syncing $key to preview..."
            body=$(jq -n --arg key "$key" --arg value "$value" '{key:$key, value:$value, type:"plain", target:["preview"]}')
            curl -sS -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$body"
          }
          sync_var "$CONTACT_EMAIL" "NEXT_PUBLIC_CONTACT_EMAIL"
          sync_var "$BACKEND_BASE_URL" "NEXT_PUBLIC_BACKEND_BASE_URL"
          sync_var "true" "NEXT_PUBLIC_SENTRY_IS_ACTIVE"
          sync_var "https://accounts.spotify.com/authorize" "NEXT_PUBLIC_SPOTIFY_AUTH_URL"
          sync_var "$SPOTIFY_CLIENT_ID" "NEXT_PUBLIC_SPOTIFY_CLIENT_ID"
          sync_var "$SPOTIFY_REDIRECT_URI" "NEXT_PUBLIC_SPOTIFY_REDIRECT_URI"
          sync_var "$SPOTIFY_SCOPES" "NEXT_PUBLIC_SPOTIFY_SCOPES"
          sync_var "$GOOGLE_CLIENT_ID" "NEXT_PUBLIC_GOOGLE_CLIENT_ID"
          sync_var "$GOOGLE_REDIRECT_URI" "NEXT_PUBLIC_GOOGLE_REDIRECT_URI"
          sync_var "$TRACK_UPLOAD_TIMEOUT_MS" "NEXT_PUBLIC_TRACK_UPLOAD_TIMEOUT_MS"
          sync_var "$AUDIOMETA_URL" "NEXT_PUBLIC_AUDIOMETA_URL"
          echo "Preview sync done."
