# Production only: set NEXT_PUBLIC_APP_VERSION on Vercel, then trigger the production deploy hook.
# Runs on semver release tag push (vX.Y.Z) or manual workflow_dispatch — not on every push to main.
# Git must not deploy production (see vercel.json); staging uses Vercel Git builds on develop.
# Full NEXT_PUBLIC_* sync: run workflow "Vercel sync env" manually (vercel-sync-env.yml).
# See docs/DEPLOYMENT.md §3.1.
name: Vercel deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy-production:
    name: Set app version and deploy production
    runs-on: ubuntu-latest
    environment: PROD
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$VERCEL_TOKEN" ] && missing="$missing VERCEL_TOKEN"
          [ -z "$VERCEL_PROJECT_ID" ] && missing="$missing VERCEL_PROJECT_ID"
          [ -z "$VERCEL_DEPLOY_HOOK" ] && missing="$missing VERCEL_DEPLOY_HOOK"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty (PROD environment):$missing"
            exit 1
          fi
          echo "All required secrets are set."

      - name: Require semver release tag on push
        if: github.event_name == 'push'
        run: |
          ref="${GITHUB_REF}"
          if [[ ! "$ref" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Production deploy on tag push only accepts refs/tags/vMAJOR.MINOR.PATCH (got $ref)"
            exit 1
          fi

      - name: Sync app version to Vercel production
        run: bash scripts/vercel-sync-env-from-github.sh production app-version-only

      - name: Trigger Vercel production deployment
        run: |
          set -e
          echo "Triggering production deploy hook..."
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Production deploy triggered."
