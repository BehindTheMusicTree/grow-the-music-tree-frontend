# On tag push (v*): validate tag is on main and run build check. Deployment is via Vercel on push to main/develop (see docs/DEPLOYMENT.md).
name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_call:

jobs:
  validate-tag-on-main:
    name: Ensure release tag is on main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag points to a commit on main
        run: |
          TAG_REF="${{ github.ref }}"
          TAG_NAME="${TAG_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "Pre-release or dev tag ($TAG_NAME); skipping main check"
            exit 0
          fi
          TAG_COMMIT=$(git rev-parse "$TAG_REF")
          git fetch origin main
          if ! git branch -r --contains "$TAG_COMMIT" | grep -q 'origin/main'; then
            echo "::error::Tag $TAG_NAME points to a commit not on main. Release tags (vX.Y.Z) must be created from main (merge release branch, then tag). See docs/VERSIONING.md"
            exit 1
          fi
          echo "Release tag $TAG_NAME is on main"

  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    needs: [validate-tag-on-main]
    if: always() && (needs.validate-tag-on-main.result == 'success' || needs.validate-tag-on-main.result == 'skipped')
    outputs:
      app_version: ${{ steps.version.outputs.version }}
      env: ${{ steps.version.outputs.env }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Using version from tag ref: $VERSION"
          else
            git fetch --tags --force
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST_TAG" ]; then
              echo "Error: Cannot determine version. No tag provided."
              exit 1
            fi
            VERSION="${LATEST_TAG#v}"
            echo "Using latest tag version: $VERSION (from tag: $LATEST_TAG)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "env=TEST" >> "$GITHUB_OUTPUT"
            echo "Prerelease version -> env TEST"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "env=PROD" >> "$GITHUB_OUTPUT"
            echo "Release version -> env PROD"
          else
            echo "Unsupported version format: must be release (x.y.z) or prerelease (x.y.z-suffix). Got: $VERSION"
            exit 1
          fi

  test-build-app:
    name: Test build app
    runs-on: ubuntu-latest
    needs: [determine-version]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_BACKEND_BASE_URL: https://api.example.com/
          NEXT_PUBLIC_CONTACT_EMAIL: ci@example.com
          NEXT_PUBLIC_SPOTIFY_CLIENT_ID: ci-placeholder
          NEXT_PUBLIC_SPOTIFY_SCOPES: ci-placeholder
          NEXT_PUBLIC_SPOTIFY_REDIRECT_URI: https://ci.example.com/auth/spotify/callback
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
          NEXT_PUBLIC_GOOGLE_REDIRECT_URI: https://ci.example.com/auth/google/callback
          NEXT_PUBLIC_SENTRY_IS_ACTIVE: false
          NEXT_PUBLIC_TRACK_UPLOAD_TIMEOUT_MS: "300000"
          NEXT_PUBLIC_AUDIOMETA_URL: https://audiometa.themusictree.org
        run: npm run build
